<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Advisor Dashboard</title>
<style>
  :root{--bg:#0b0e14;--card:#131826;--ink:#e8ecf4;--mut:#8b93a7;--acc:#5eead4;--acc2:#a78bfa;--ok:#34d399;--bad:#f87171;--line:#232a3d}
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,Segoe UI,sans-serif;padding:28px 16px}
  .wrap{max-width:960px;margin:0 auto}
  h1{font-size:1.5rem}
  .sub{color:var(--mut);margin:4px 0 22px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .name{font-size:.8rem;letter-spacing:.07em;text-transform:uppercase;color:var(--mut)}
  .val{font-size:1.9rem;font-weight:800;margin:2px 0}
  .delta{font-size:.85rem}
  .delta.up{color:var(--ok)}.delta.down{color:var(--bad)}.delta.flat{color:var(--mut)}
  svg{width:100%;height:56px;margin-top:10px}
  .goal{margin-top:8px}
  .gtrack{height:7px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:4px}
  .gfill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2))}
  .gmeta{display:flex;justify-content:space-between;color:var(--mut);font-size:.78rem;margin-top:4px}
  .empty{color:var(--mut);padding:40px;text-align:center;border:1px dashed var(--line);border-radius:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Advisor Dashboard</h1>
  <div class="sub" id="stamp"></div>
  <div class="grid" id="grid"></div>
</div>
<script>
// The advisor replaces the placeholder below with the contents of
// ~/.claude/advisor/metrics.json, and TARGETS with {"metric": target} pairs
// pulled from goals.md at generation time.
const METRICS = /*__METRICS_JSON__*/ [];
const TARGETS = /*__TARGETS_JSON__*/ {};

const byM = {};
METRICS.forEach(m=>{(byM[m.metric]=byM[m.metric]||[]).push(m);});
Object.values(byM).forEach(a=>a.sort((x,y)=>x.date<y.date?-1:1));
const grid=document.getElementById("grid");
document.getElementById("stamp").textContent=
  METRICS.length?`${METRICS.length} entries · ${Object.keys(byM).length} metrics · latest ${METRICS.map(m=>m.date).sort().at(-1)}`:"";

if(!METRICS.length){
  grid.outerHTML='<div class="empty">No metrics yet. Say “advisor, log a metric” to start.</div>';
}else{
  for(const [name,rows] of Object.entries(byM)){
    const vals=rows.map(r=>+r.value);
    const cur=vals.at(-1), prev=vals.length>1?vals.at(-2):null;
    const d=prev===null?null:cur-prev;
    const dir=d===null?"flat":d>0?"up":d<0?"down":"flat";
    const dTxt=d===null?"first entry":`${d>0?"▲":d<0?"▼":"—"} ${Math.abs(d).toLocaleString()} vs last`;
    // sparkline
    const w=280,h=56,min=Math.min(...vals),max=Math.max(...vals),span=(max-min)||1;
    const pts=vals.map((v,i)=>`${(i*(w-6)/Math.max(vals.length-1,1))+3},${h-6-((v-min)/span)*(h-12)}`).join(" ");
    const tgt=TARGETS[name];
    let goalHtml="";
    if(tgt!==undefined&&tgt!==null){
      const base=vals[0], pct=Math.max(0,Math.min(100,100*(cur-base)/((tgt-base)||1)));
      goalHtml=`<div class="goal"><div class="gtrack"><div class="gfill" style="width:${pct}%"></div></div>
        <div class="gmeta"><span>${pct.toFixed(0)}% to target</span><span>target ${(+tgt).toLocaleString()}</span></div></div>`;
    }
    const el=document.createElement("div");el.className="card";
    el.innerHTML=`<div class="name">${name}</div><div class="val">${cur.toLocaleString()}</div>
      <div class="delta ${dir}">${dTxt}</div>
      <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <polyline points="${pts}" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round"/>
        <defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs>
      </svg>${goalHtml}`;
    grid.appendChild(el);
  }
}
</script>
</body>
</html>

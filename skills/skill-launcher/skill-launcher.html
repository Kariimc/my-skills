<div id="app"></div>
<style>
:root{--bg:#faf9f7;--fg:#16161a;--muted:#6b7280;--card:#fff;--line:#e6e4df;--accent:#4f46e5;--ok:#16a34a}
:root[data-theme=dark],html[data-theme=dark]{--bg:#0b0b0f;--fg:#f4f3ee;--muted:#8a8f98;--card:#15151b;--line:#26262e;--accent:#8b8cf9;--ok:#4ade80}
@media(prefers-color-scheme:dark){:root:not([data-theme=light]){--bg:#0b0b0f;--fg:#f4f3ee;--muted:#8a8f98;--card:#15151b;--line:#26262e;--accent:#8b8cf9;--ok:#4ade80}}
*{box-sizing:border-box}
body{margin:0}
#app{font:15px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
.wrap{max-width:1080px;margin:0 auto;padding:28px 22px 80px}
h1{font-size:20px;margin:0 0 2px;font-weight:680;letter-spacing:.01em}
.sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.search{width:100%;padding:15px 16px;font-size:16px;border:1.5px solid var(--line);border-radius:13px;background:var(--card);color:var(--fg)}
.search:focus{outline:none;border-color:var(--accent)}
.hint{color:var(--muted);font-size:12px;margin:8px 2px 0}
.goals{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}
.goal{cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:999px;padding:7px 14px;font-size:13px}
.goal.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sec{margin:22px 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 15px;display:flex;flex-direction:column;gap:7px}
.card .top{display:flex;align-items:center;gap:8px}
.nm{font-weight:650;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13.5px}
.why{color:var(--ok);font-size:12px}
.dsc{color:var(--muted);font-size:13px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.row{display:flex;gap:7px;margin-top:3px}
.btn{cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--fg);border-radius:8px;padding:6px 10px;font-size:12px}
.btn.p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn:active{transform:translateY(1px)}
.star{margin-left:auto;cursor:pointer;color:var(--muted);border:none;background:none;font-size:15px}
.star.on{color:#f59e0b}
.recipe{background:var(--card);border:1px dashed var(--line);border-radius:13px;padding:13px 15px;margin-bottom:10px}
.recipe b{font-size:14px}
.chain{color:var(--muted);font-size:12.5px;margin:4px 0 8px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--fg);color:var(--bg);padding:9px 16px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.themebtn{position:fixed;top:14px;right:16px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:999px;padding:6px 12px;font-size:12px}
.count{color:var(--muted);font-size:12px}
.badge{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);border:1px solid var(--accent);border-radius:5px;padding:1px 5px}
.kinds{display:flex;gap:8px;margin:12px 0 0}
.kind{cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:8px;padding:5px 12px;font-size:12px}
.kind.on{background:var(--fg);color:var(--bg);border-color:var(--fg)}
</style>
<script>
const SKILLS = [{"name": "3d-master-modeler", "desc": "Autonomous 3D asset generator and technical-art engine. Builds 3D models from scratch in code \u2014 Blender (bpy) headless, Three.js WebGPU + TSL, build123d/OpenSCAD CAD \u2014 with non-destructive modifier stacks, procedural + photo-real PBR (CC0 pipeline), 3-point lighting, numeric mesh-validation gates (trimesh/manifold3d), and compressed delivery (Draco/Meshopt glTF, OpenUSD). Use when the user wants to generate, model, or build a 3D asset/model/scene/mesh in code, write a Blender or bpy script, author WebGPU/TSL materials, create procedural PBR, or render a preview of a generated model. (2D art to game asset \u2192 game-assets; AI image-to-3D \u2192 omni3d; print slicing \u2192 3d-printing; rig/pose inspection \u2192 blender-motion-state-inspection.)", "kind": "skill", "category": "Other", "goal": "Build"}, {"name": "3d-printing", "desc": "Expert CAD and slicer mastery engineer for 3D printing. Covers Design for Additive Manufacturing (DFAM), slicer physics, shell calibration, thermal management, volumetric speed, first layer adhesion, and defect troubleshooting. Use when the user wants to optimize a 3D print, fix print defects (stringing, warping, under-extrusion), configure slicer settings, design parts for printability, or calibrate a printer.", "kind": "skill", "category": "Domain & Compliance", "goal": "Design"}, {"name": "accessibility", "desc": "Expert accessibility (a11y) engineer and inclusive design specialist. Implements WCAG 2.2 AA/AAA compliance, WAI-ARIA patterns, keyboard navigation, screen-reader optimizations, and automated accessibility testing in CI/CD pipelines using Axe-core with Playwright/Cypress. Use when the user wants to make a component accessible, implement ARIA patterns, add keyboard navigation, fix screen reader issues, audit a design for WCAG compliance, or set up automated a11y testing in CI.", "kind": "skill", "category": "Web & Frontend", "goal": "Fix & Debug"}, {"name": "add-new-resource", "desc": "> Add a single file or resource to the second brain. Use when the user wants to save, file, ingest, or \"add this to my brain/knowledge base\" \u2014 a document, link, note, export, image, or any artifact worth keeping. Places the file in raw/ unaltered and updates the wiki/ entries that should reference it.", "kind": "skill", "category": "Other", "goal": "Design"}, {"name": "advanced-math", "desc": "Principal Mathematician, Formal Verifier, and Academic Researcher. Provides Bourbaki-style rigorous proofs, formal definitions, lemma construction, counter-example generation, and Lean/Isabelle formalization. Use when the user needs a rigorous mathematical proof, formal derivation, counter-example analysis, proof debugging, or translation of informal proofs into computer-verifiable logic across any domain (Abstract Algebra, Differential Geometry, Topology, Number Theory, etc.).", "kind": "skill", "category": "Research & Analysis", "goal": "Fix & Debug"}, {"name": "advisor", "desc": ">- Personal advisor that interviews the user to build a clear picture of who they are and their goals for the year (income targets, projects, metrics), writes and maintains a 12-month plan, tracks metrics over time, and builds interactive local HTML trainings for skills they want to learn. Use when the user says \"advisor\", \"interview me\", \"my goals\", \"yearly goals\", \"12-month plan\", \"goal check-in\", \"weekly review\", \"quarterly review\", \"track my metrics\", \"log a metric\", \"show my dashboard\", \"build me a training\", or wants coaching toward money/project/skill targets. Not for one-off project planning that isn't tied to the user's personal goals.", "kind": "skill", "category": "Other", "goal": "Build"}, {"name": "agent-architecture-audit", "desc": "Full-stack diagnostic for agent and LLM applications. Audits the 12-layer agent stack for wrapper regression, memory pollution, tool discipline failures, hidden repair loops, and rendering corruption. Produces severity-ranked findings with code-first fixes. Essential for developers building agent applications, autonomous loops, or any LLM-powered feature. Use when the user wants to audit an agent or LLM app for production readiness, or debug an agent that got worse after adding wrapper layers, memory, or tools \u2014 flaky tool calls, hidden retry loops, or 'fine in the playground, broken in my wrapper'.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "agent-eval", "desc": "Head-to-head comparison of coding agents (Claude Code, Aider, Codex, etc.) on custom tasks with pass rate, cost, time, and consistency metrics. Use when the user wants to benchmark or compare coding agents on their own repo with YAML task definitions, measure agent pass rate/cost/time/consistency before adopting a tool or model, or run reproducible git-worktree-isolated agent eval trials.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "agent-harness-construction", "desc": "Design and optimize AI agent action spaces, tool definitions, and observation formatting for higher completion rates. Use when the user wants to raise an AI agent's completion rate by redesigning its action space, tool definitions, observation formatting, or error-recovery and context-budget strategy.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "agent-introspection-debugging", "desc": "Structured self-debugging workflow for AI agent failures using capture, diagnosis, contained recovery, and introspection reports. Use when an AI agent run is failing repeatedly, looping on the same tools, burning tokens without progress, or drifting off task and needs structured self-diagnosis before escalating to a human.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Fix & Debug"}, {"name": "agent-payment-x402", "desc": "Add x402 payment execution to AI agents with per-task budgets, spending controls, and non-custodial wallets. Supports Base through agentwallet-sdk and X Layer through OKX Payments / OKX Agent Payments Protocol. Use when the user wants an AI agent to make policy-gated payments \u2014 pay a 402-gated API, settle with another agent, enforce per-task budgets, or use a non-custodial wallet on Base or X Layer.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "agent-self-evaluation", "desc": "Use after completing any non-trivial task. The agent self-rates its output on 5 axes \u2014 accuracy, completeness, clarity, actionability, conciseness \u2014 with concrete evidence per criterion. Produces a structured 1-5 scorecard with specific improvement suggestions. Use when the user wants the agent to grade or rate its own just-completed output (code spanning multiple files, a multi-step workflow, a debugging session, a design doc) against the 5-axis rubric, or asks \"how good was that?\" / \"rate yourself\".", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "agent-sort", "desc": "Build an evidence-backed ECC install plan for a specific repo by sorting skills, commands, rules, hooks, and extras into DAILY vs LIBRARY buckets using parallel repo-aware review passes. Use when ECC should be trimmed to what a project actually needs instead of loading the full bundle.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "agent-swarm", "desc": "Principal AI Systems Engineer and Distributed Multi-Agent Architect. Designs and implements AI agent swarms with dynamic routing, task handoffs, parallel processing, shared memory, and consensus aggregation using CrewAI, AutoGen, LangGraph, and OpenAI Swarm. Use when the user wants to build a multi-agent AI system, design agent roles and handoff logic, implement shared state/blackboard architecture, prevent infinite agent loops, control swarm token costs, or debug a broken agent orchestration pipeline.", "kind": "skill", "category": "AI & Agents", "goal": "Automate & Loop"}, {"name": "agentic-engineering", "desc": "Operate as an agentic engineer using eval-first execution, decomposition, and cost-aware model routing. Use when the user wants to run an eval-first agentic engineering workflow \u2014 define completion criteria, decompose work into agent-sized units, and route model tiers by task complexity.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "agentic-os", "desc": "Build persistent multi-agent operating systems on Claude Code. Covers kernel architecture, specialist agents, slash commands, file-based memory, scheduled automation, and state management without external databases. Use when the user wants to build a persistent multi-agent 'agentic OS' or personal OS on Claude Code with specialist agents, file-based memory, scheduled automation, and state that survives session restarts.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "ai-agent-developer", "desc": "Principal AI Engineer and Multi-Agent Systems Architect specializing in LLM tool deployment. Designs and implements custom AI agent skills, tool schemas, few-shot prompt engineering, RAG pipelines, and agent loop debugging across LangChain, LlamaIndex, CrewAI, and direct API implementations. Use when the user wants to build a custom AI agent tool, design a JSON tool schema for an LLM, engineer few-shot examples, optimize a RAG retrieval pipeline, or debug an agent stuck in an infinite tool-call loop.", "kind": "skill", "category": "AI & Agents", "goal": "Automate & Loop"}, {"name": "ai-first-engineering", "desc": "Engineering operating model for teams where AI agents generate a large share of implementation output. Use when the user wants to design process, code review, or architecture for a team that ships a large share of its code via AI agents.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "ai-regression-testing", "desc": "Regression testing strategies for AI-assisted development. Sandbox-mode API testing without database dependencies, automated bug-check workflows, and patterns to catch AI blind spots where the same model writes and reviews code. Use when the user wants to write regression tests after an AI agent modified API routes or backend logic, set up sandbox/mock-mode Vitest tests for Next.js API routes without a database, or catch recurring AI mistakes like sandbox/production response-shape drift and SELECT-clause omissions.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Fix & Debug"}, {"name": "ai-vision", "desc": "Expert AI Vision engineer and media forensics specialist. Builds multimodal AI pipelines that extract, decipher, and map frontend assets and inferred backend architectures from any media source (images, video, screenshots, UI mockups). Use when the user wants to reverse-engineer a UI from a screenshot, extract component hierarchies from images, build a vision API pipeline, perform OCR extraction, or auto-generate schemas and architecture from visual media.", "kind": "skill", "category": "AI & Agents", "goal": "Research"}, {"name": "algorithmic-art", "desc": "Creating algorithmic art using p5.js with seeded randomness and interactive parameter exploration. Use this when users request creating art using code, generative art, algorithmic art, flow fields, or particle systems. Create original algorithmic art rather than copying existing artists' work to avoid copyright violations.", "kind": "skill", "category": "Anthropic official skills 17", "goal": "Design"}, {"name": "android-clean-architecture", "desc": "Clean Architecture patterns for Android and Kotlin Multiplatform projects \u2014 module structure, dependency rules, UseCases, Repositories, and data layer patterns. Use when the user wants to structure Android/KMP modules across domain/data/presentation layers, implement UseCases, Repositories, or DataSources with Room, SQLDelight, or Ktor, or wire dependency injection with Koin or Hilt under clean-architecture dependency rules.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "angular-developer", "desc": "Generates Angular code and provides architectural guidance. Trigger when creating projects, components, or services, or for best practices on reactivity (signals, linkedSignal, resource), forms, dependency injection, routing, SSR, accessibility (ARIA), animations, styling (component styles, Tailwind CSS), testing, or CLI tooling.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "animation-particle-design", "desc": "Principal Technical Artist and VFX Supervisor for high-fidelity real-time particle simulations and animation state machines. Use when the user wants to design particle effects, VFX systems, animation state machines, Niagara/VFX Graph setups, Houdini VAT pipelines, or debug desynced/drifting particle effects in Unreal Engine, Unity, or Houdini.", "kind": "skill", "category": "Game Development", "goal": "Design"}, {"name": "anime-artist", "desc": "Expert generative AI prompt engineer specializing in copyright-free manga and anime style art generation. Creates hyper-dense Midjourney and Stable Diffusion prompts using historical art movements and technical style attributes \u2014 never trademarked IPs or protected characters. Also provides metadata schemas and automation scripts for clean asset tagging. Use when the user wants to generate anime or manga style art prompts, create copyright-safe character designs, build background layouts, or automate image metadata management for marketplace compliance.", "kind": "skill", "category": "Design & Creative", "goal": "Design"}, {"name": "apex", "desc": ">- The apex control-plane skill \u2014 the supreme, self-enforcing guardrail layer that makes the mistakes of the last month structurally impossible and guarantees no mistake ever recurs. One prompt installs and arms a tamper-resistant suite of gates (commit + push + CI) that self-heal drift, block regressions, guard themselves, and grow a new gate from every new mistake (the ratchet). Use when the user wants to fortify or lock down the control plane, prevent a class of mistakes from ever happening again, audit/repair the guardrails, or run /apex.", "kind": "skill", "category": "Other", "goal": "Fix & Debug"}, {"name": "api-connector-builder", "desc": "Build a new API connector or provider by matching the target repo's existing integration pattern exactly. Use when adding one more integration without inventing a second architecture.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "api-design", "desc": "REST API design patterns including resource naming, status codes, pagination, filtering, error responses, versioning, and rate limiting for production APIs. Use when the user wants to design or review REST API endpoints \u2014 resource naming, status codes, pagination, filtering, error responses, versioning, or rate limiting.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "api-integration", "desc": "Principal Data Engineer and API Integrator. Identifies, tests, and integrates free or open-source APIs (MusicBrainz, Jamendo, Freesound, Web Audio API, and others) into enterprise applications and local desktop GUIs. Writes clean API consumer scripts, handles auth tokens, rate limiting, media stream downloads, and async fetch pipelines. Use when the user wants to connect to an API, build a data pipeline, write API consumer scripts, handle authentication, or set up local documentation for an API integration.", "kind": "skill", "category": "Software Engineering & Tooling", "goal": "Build"}, {"name": "app-store-compliance", "desc": "Expert app store compliance officer and legal-tech automation engineer. Audits code, architecture, and deployment configurations against Apple App Store Guidelines, Google Play Developer Policies, GDPR/CCPA, and web deployment legal frameworks. Generates interactive markdown compliance checklists and automated deployment-readiness scripts. Use when the user wants to audit an app for store compliance, check for ToS violations (Spotify, YouTube scraping), validate privacy policy requirements, or generate a deployment-ready compliance checklist.", "kind": "skill", "category": "Domain & Compliance", "goal": "Build"}, {"name": "ar-vr-developer", "desc": "Principal XR Engine Developer, Spatial Computing Architect, and Interaction Engineer. Builds high-performance AR/VR experiences for Apple Vision Pro (visionOS), Meta Quest 3, HTC Vive, and WebXR using Unity MRTK3, Unreal Engine 5 OpenXR, and native C++. Enforces 90Hz/120Hz frame locks, sub-15ms motion-to-photon latency, and zero-GC update loops. Use when the user wants to build an XR interaction system, implement hand tracking, design spatial UI, anchor virtual objects to real-world surfaces, debug tracking drift, or optimize draw calls on a standalone headset.", "kind": "skill", "category": "Game Development", "goal": "Build"}, {"name": "architecture-decision-records", "desc": "Capture architectural decisions made during Claude Code sessions as structured ADRs. Auto-detects decision moments, records context, alternatives considered, and rationale. Maintains an ADR log so future developers understand why the codebase is shaped the way it is. Use when the user wants to record an architectural decision as an ADR (Nygard format under docs/adr/), document why a framework/library/database/pattern was chosen over alternatives, or look up the rationale behind a past \"why did we choose X?\" decision.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "article-writing", "desc": "Write articles, guides, blog posts, tutorials, newsletter issues, and other long-form content in a distinctive voice derived from supplied examples or brand guidance. Use when the user wants polished written content longer than a paragraph, especially when voice consistency, structure, and credibility matter.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Write"}, {"name": "audio-engineer", "desc": "Principal Audio Engineer and Acoustic Systems Architect. Covers studio mixing/mastering, live sound reinforcement, DSP, acoustics, audio repair/restoration, and automated audio pipeline programming (FFT, Python Librosa/Pydub, FFmpeg). Provides beginner-friendly explanations using real-world analogies and auto-generates local README documentation with an Audio Engineering Changelog. Use when the user wants to mix or master audio, repair corrupted sound files, set up a DAW template, write audio processing scripts, analyze frequency spectrums, or document an audio pipeline.", "kind": "skill", "category": "Design & Creative", "goal": "Write"}, {"name": "automation-audit-ops", "desc": "Evidence-first automation inventory and overlap audit workflow for ECC. Use when the user wants to know which jobs, hooks, connectors, MCP servers, or wrappers are live, broken, redundant, or missing before fixing anything.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "autonomous-agent-harness", "desc": "Stand up the persistent infrastructure that turns Claude Code into a fully autonomous agent system \u2014 persistent memory, scheduled operations (crons), computer use, and task queuing. Replaces standalone frameworks (Hermes, AutoGPT) using Claude Code's native crons, dispatch, MCP tools, and memory. Use when the user wants to BUILD the always-on infrastructure for autonomous operation. To run or orchestrate a loop prefer harness-autonomous; for loop-architecture patterns see continuous-agent-loop.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "backend-design", "desc": "Principal Backend Engineer and Cloud Architect specializing in distributed game systems. Designs production-ready backend services including matchmaking, inventory, leaderboards, authentication, WebSocket servers, and telemetry pipelines. Use when the user wants to architect a game backend service, design a real-time multiplayer system, build a database schema for games, implement cheat prevention, load test a backend, or debug database deadlocks and performance bottlenecks.", "kind": "skill", "category": "Software Engineering & Tooling", "goal": "Build"}, {"name": "backend-patterns", "desc": "Backend architecture patterns, API design, database optimization, and server-side best practices for Node.js, Express, and Next.js API routes. Use when the user wants to build Node.js/Express/Next.js API routes with repository/service/controller layers, fix N+1 queries or add Redis caching, or implement server-side auth middleware, RBAC, retry/backoff, queues, and structured logging.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "benchmark", "desc": "Use this skill to measure performance baselines, detect regressions before/after PRs, and compare stack alternatives.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Research"}, {"name": "benchmark-methodology", "desc": ">- Use after competitive-platform-analysis has produced a tiered competitor set. Scores each competitor across nine weighted dimensions (positioning, voice, visual craft, offer packaging, evidence, enterprise-readiness, thought leadership, pricing, client's strategic tension) with explicit 1\u20135 rubrics and a tension-plot. Precedes competitive-report-structure.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Research"}, {"name": "benchmark-optimization-loop", "desc": "Use when the user asks to make something faster, try many variants, run recursive optimization, benchmark latency/throughput/cost, or choose the best implementation by repeated measured tests.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Research"}, {"name": "blender-motion-state-inspection", "desc": "Use this skill when inspecting Blender characters, rigs, poses, animation retargeting, ground contact, facing direction, or model-vs-motion alignment where screenshots alone are not enough.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Design"}, {"name": "blueprint", "desc": ">- Turn a one-line objective into a step-by-step construction plan for multi-session, multi-agent engineering projects. Each step has a self-contained context brief so a fresh agent can execute it cold. Includes adversarial review gate, dependency graph, parallel step detection, anti-pattern catalog, and plan mutation protocol. TRIGGER when: user requests a plan, blueprint, or roadmap for a complex multi-PR task, or describes work that needs multiple sessions. DO NOT TRIGGER when: task is completable in a single PR or fewer than 3 tool calls, or user says \"just do it\".", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "brainstorming", "desc": "Interactive idea refinement using Socratic method to develop fully-formed designs. Use when partner describes any feature or project idea, before writing code or implementation plans.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "Build"}, {"name": "brand-discovery", "desc": ">- Use when a brand needs to discover or articulate its identity through structured multi-session interviews. Covers purpose, positioning, audience, personality, voice, narrative, and founder-brand tension across 8 modules using laddering, 5 Whys, and projective techniques. Produces a resumable session with disk-persisted state and a master brandbook (90_SYNTHESIS.md).", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Design"}, { s to build a compliant cannabis delivery app in New Jersey, integrate METRC, implement age verification, design driver dispatch systems, or architect cross-platform cannabis e-commerce with regulatory compliance baked in.", "kind": "skill", "category": "Domain & Compliance", "goal": "Build"}, {"name": "cannabis-delivery-compliance", "desc": "Comprehensive NJ-compliant cannabis delivery platform implementation guide. Covers corporate formation (NJ CRC Class 6 license), full PostgreSQL schema with PostGIS geospatial indexing, TypeScript compliance middleware (age verification, weight limits, geofencing with Turf.js), Dutchie/METRC POS synchronization workers, and Docker/GitHub Actions deployment. Use when the user wants the full end-to-end technical implementation of an NJ cannabis delivery platform, including production-ready database schemas, compliance code, POS sync workers, and CI/CD deployment configs.", "kind": "skill", "category": "Domain & Compliance", "goal": "Manage repo & config"}, {"name": "canvas-design", "desc": "Create beautiful visual art in .png and .pdf documents using design philosophy. You should use this skill when the user asks to create a poster, piece of art, design, or other static piece. Create original visual designs, never copying existing artists' work to avoid copyright violations.", "kind": "skill", "category": "Anthropic official skills 17", "goal": "Design"}, {"name": "carrier-relationship-management", "desc": "> Codified expertise for managing carrier portfolios, negotiating freight rates, tracking carrier performance, allocating freight, and maintaining strategic carrier relationships. Informed by transportation managers with 15+ years experience. Includes scorecarding frameworks, RFP processes, market intelligence, and compliance vetting. Use when managing carriers, negotiating rates, evaluating carrier performance, or building freight strategies.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"nam at's redundant / what's missing\" in a system.", "kind": "skill", "category": "Other", "goal": "Fix & Debug"}, {"name": "harness-autonomous", "desc": ">- The Autonomous-Ops Harness \u2014 a persistent loop with memory and a schedule that keeps working between sessions. Wires crons, task queues, file-based memory, and a quality gate into a self-directing agent that runs on an interval and recovers from stalls. Use when the user wants continuous or scheduled operation, a recurring/looping task, monitoring, or an agent that keeps making progress on its own and remembers context across sessions.", "kind": "skill", "category": "Other", "goal": "Automate & Loop"}, {"name": "harness-build", "desc": ">- The Build Harness \u2014 turn a feature/app/game/API request into a shipped, reviewed change. Drives the full intent \u2192 plan \u2192 parallel build \u2192 review \u2192 verify \u2192 PR loop using the planner, language build-resolvers, language reviewers, and verification skills. Use when the user wants to build, implement, add, or ship a feature, app, game, utility, endpoint, or any non-trivial code change (more than a single-file fix).", "kind": "skill", "category": "Other", "goal": "Build"}, {"name": "harness-quality", "desc": ">- The Quality (GAN) Harness \u2014 generate \u2194 adversarially evaluate \u2194 iterate until output clears a strict rubric. A separate ruthless evaluator critiques the generator's work each round, driving quality past what one agent self-rating ever reaches. Use when the user wants production-quality, polished, or high-craft output and \"AI slop\" is unacceptable \u2014 beautiful UIs, refined copy, or any deliverable with a scorable quality bar.", "kind": "skill", "category": "Other", "goal": "Fix & Debug"}, {"name": "harness-refactor", "desc": ">- The Refactor/Simplify Harness \u2014 improve the shape of existing code without changing its behavior. Baselines behavior, finds duplication / dead code / needless complexity, refactors in small reversible steps, and verifies behavior is unchanged after each one. Use when the user wants to refactor, simplify, clean up, deduplicate, consolidate, or remove dead code \u2014 any structure-only change where the cardinal rule is \"behavior must not change\".", "kind": "skill", "category": "Other", "goal": "Fix & Debug"}, {"name": "harness-research", "desc": ">- The Research/Verify Harness \u2014 fan out parallel searches, fetch sources, adversarially verify each claim, then synthesize a cited answer. Every non-trivial claim is checked against a source before it ships; nothing is asserted from memory. Use when the user wants to research, investigate, compare options, analyze a market or competitor, or get a fact-checked, sourced report on any topic.", "kind": "skill", "category": "Other", "goal": "Research"}, {"name": "harness-visual", "desc": ">- The Visual Harness \u2014 generate \u2192 preview \u2192 MEASURE \u2192 iterate for anything visual: UIs, 3D renders, graphics, mockups. Every round publishes a clickable preview and, when a reference exists, scores the output with a numeric image diff; the loop exits on a measured threshold, never on \"looks fine\". Use when the user wants visual work matched to a reference or held to cinema/production quality \u2014 \"match this image\", \"make it look like X\", \"AAA quality render\", \"pixel-faithful\", or any visual deliverable where eyeballing has failed before.", "kind": "skill", "category": "Other", "goal": "Design"}, {"name": "healthcare-cdss-patterns", "desc": "Clinical Decision Support System (CDSS) development patterns. Drug interaction checking, dose validation, clinical scoring (NEWS2, qSOFA), alert severity classification, and integration into EMR workflows. Use when the user wants to build drug interaction or dose validation engines, implement clinical scoring (NEWS2, qSOFA, APACHE, GCS), design abnormal-value alerts, or add medication order safety checks to an EMR.", "kind": "skill", "category": "ECC engin reGuard connection.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "hookify-rules", "desc": "This skill should be used when the user asks to create a hookify rule, write a hook rule, configure hookify, add a hookify rule, or needs guidance on hookify rule syntax and patterns.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Manage repo & config"}, {"name": "huggingface", "desc": "HuggingFace ecosystem expert \u2014 model hub, Transformers, Diffusers, Datasets, Inference API, Spaces, and PEFT/fine-tuning. Use when the user wants to load or deploy a HuggingFace model, write Transformers/Diffusers pipelines, fine-tune with LoRA/QLoRA, push to the Hub, or build a Gradio Space.", "kind": "skill", "category": "Other", "goal": "Build"}, {"name": "impeccable", "desc": "Use when the user wants to design, redesign, shape, critique, audit, polish, clarify, distill, harden, optimize, adapt, animate, colorize, extract, or otherwise improve a frontend interface. Covers websites, landing pages, dashboards, product UI, app shells, components, forms, settings, onboarding, and empty states. Handles UX review, visual hierarchy, information architecture, cognitive load, accessibility, performance, responsive behavior, theming, anti-patterns, typography, fonts, spacing, layout, alignment, color, motion, micro-interactions, UX copy, error states, edge cases, i18n, and reusable design systems or tokens. Also use for bland designs that need to become bolder or more delightful, loud designs that should become quieter, live browser iteration on UI elements, or ambitious visual effects that should feel technically extraordinary. Not for backend-only or non-UI tasks.", "kind": "skill", "category": "Web & Frontend", "goal": "Design"}, {"name": "improve-system", "desc": "> Audit and improve the second-brain system in one pass. Use when the user wants to improve/clean up/maintain the brain, review it for problems, or run the improvem  "Anthropic official skills 17", "goal": "Write"}, {"name": "inventory-demand-planning", "desc": "> Codified expertise for demand forecasting, safety stock optimization, replenishment planning, and promotional lift estimation at multi-location retailers. Informed by demand planners with 15+ years experience managing hundreds of SKUs. Includes forecasting method selection, ABC/XYZ analysis, seasonal transition management, and vendor negotiation frameworks. Use when forecasting demand, setting safety stock, planning replenishment, managing promotions, or optimizing inventory levels.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Design"}, {"name": "inversion-exercise", "desc": "Flip core assumptions to reveal hidden constraints and alternative approaches - \"what if the opposite were true?\". Use when stuck on unquestioned assumptions or feeling forced into \"the only way\" to do something.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "More"}, {"name": "investor-materials", "desc": "Create and update pitch decks, one-pagers, investor memos, accelerator applications, financial models, and fundraising materials. Use when the user needs investor-facing documents, projections, use-of-funds tables, milestone plans, or materials that must stay internally consistent across multiple fundraising assets.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "investor-outreach", "desc": "Draft cold emails, warm intro blurbs, follow-ups, update emails, and investor communications for fundraising. Use when the user wants outreach to angels, VCs, strategic investors, or accelerators and needs concise, personalized, investor-facing messaging.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Write"}, {"name": "ios-icon-gen", "desc": "Generate iOS app icons as PNG imagesets for Xcode asset catalogs from SF Symbols (5000+ Apple-native) or Iconify API (275k+ open nd Flow patterns for Android and KMP \u2014 structured concurrency, Flow operators, StateFlow, error handling, and testing. Use when the user wants to write Kotlin coroutine async code, model reactive streams with Flow/StateFlow/SharedFlow, manage coroutine scopes and cancellation, or test suspending functions and Flows with runTest/Turbine.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Fix & Debug"}, {"name": "kotlin-exposed-patterns", "desc": "JetBrains Exposed ORM patterns including DSL queries, DAO pattern, transactions, HikariCP connection pooling, Flyway migrations, and repository pattern. Use when the user wants to access a database from Kotlin with JetBrains Exposed, write Exposed DSL or DAO queries, configure HikariCP pooling or Flyway migrations, or build a repository layer over Exposed.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "kotlin-ktor-patterns", "desc": "Ktor server patterns including routing DSL, plugins, authentication, Koin DI, kotlinx.serialization, WebSockets, and testApplication testing. Use when the user wants to build a Ktor HTTP server, configure Ktor plugins (Auth, CORS, ContentNegotiation, StatusPages), wire Koin DI, add WebSockets, or write Ktor integration tests with testApplication.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "kotlin-patterns", "desc": "Idiomatic Kotlin patterns, best practices, and conventions for building robust, efficient, and maintainable Kotlin applications with coroutines, null safety, and DSL builders. Use when the user wants to write, review, or refactor general-purpose Kotlin code, apply null safety and sealed-class idioms, design type-safe DSL builders, or configure Gradle Kotlin DSL builds.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "kotlin-testing", "desc": "Kotlin testing patterns with Kotest, MockK, coroutine testing, property-based testing, and rite and proposes new standing rules \u2014 never auto-applying them. Complements project-context-loader's routine PROGRESS.md handoff rather than replacing it. Use when the user explicitly asks to reflect, debrief, or \"capture what we learned\" from a session, or when the same correction has now repeated across sessions and needs escalating into a proposed rule.", "kind": "skill", "category": "Other", "goal": "Manage repo & config"}, {"name": "session-start-hook", "desc": "Creating and developing startup hooks for Claude Code on the web. Use when the user wants to set up a repository for Claude Code on the web, create a SessionStart hook to ensure their project can run tests and linters during web sessions, validate environment variables, configure git identity, verify tool versions, or automate pre-session environment setup.", "kind": "skill", "category": "Software Engineering & Tooling", "goal": "Manage repo & config"}, {"name": "simplification-cascades", "desc": "Find one insight that eliminates multiple components - \"if this is true, we don't need X, Y, or Z\". Use when implementing the same concept multiple ways, accumulating special cases, or complexity is spiraling.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "Build"}, {"name": "skill-builder", "desc": "Expert DevOps Engineer and Automation Script Writer that converts any blueprint, prompt structure, or ruleset into a standardized Claude Code skill file (SKILL.md) with valid YAML frontmatter, semantic naming, proper directory structure, loop engineering protocols, domain-specific quality gates, and a ready-to-run Bash/Python automation script. Use when the user wants to convert a blueprint or prompt into a local skill file, auto-generate a skill from instructions, create a structured SKILL.md with cohesive naming, build a skill from scratch for a new domain, test or improve an existing skill, or produce a one-click automation script to write and save the skill g in the last 30 days, vet each candidate against the skills you already have, then ship the winners. Pairs the `last30days` trend radar with `skill-scout` and `skill-ship`. Use when the user wants to find new skills/plugins/repos to add, scout a domain for trending tools, or decide what's worth adopting before building a skill from scratch.", "kind": "skill", "category": "Other", "goal": "Manage repo & config"}, {"name": "skill-scout", "desc": "Search existing local, marketplace, GitHub, and web skill sources before creating a new skill. Use when the user wants to create, build, fork, or find a skill for a workflow.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Manage repo & config"}, {"name": "skill-ship", "desc": ">- The control-plane doctor and shipper for this skills repo \u2014 add or change a skill, rule, hook, or command correctly in one prompt, with no drift left behind. Validates frontmatter, de-collides triggers, reconciles README counts, lints hooks, syncs to ~/.claude, verifies the change is actually live, then commits. Use when the user wants to add, change, fix, or ship a skill / rule / hook / command in this control repo, or to doctor the repo for drift (stale counts, trigger-less skills, broken sync, colliding triggers).", "kind": "skill", "category": "Other", "goal": "Manage repo & config"}, {"name": "skill-stocktake", "desc": "Use when auditing Claude skills and commands for quality. Supports Quick Scan (changed skills only) and Full Stocktake modes with sequential subagent batch evaluation.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Manage repo & config"}, {"name": "slack-gif-creator", "desc": "Knowledge and utilities for creating animated GIFs optimized for Slack. Provides constraints, validation tools, and animation concepts. Use when users request animated GIFs for Slack like \"make me a GIF of X doing Y for Slack.", "kind": "skill", "category": "Anthropic official skills 17", "goal": "Design"}, {"name": "sneaker-aggregator", "desc": "Expert full-stack engineer specializing in sneaker release aggregator platforms. Builds production-ready Next.js 14 App Router apps with Playwright anti-bot scraping, PostgreSQL/Prisma databases, real-time price tracking, NextAuth v5 authentication, Framer Motion UI, and universal calendar integration (.ics / Google Calendar / Yahoo). Use when the user wants to build a sneaker release site, aggregate product data from retail sites, implement a release calendar with calendar app integration, design a premium dark-mode Next.js frontend with animated card grids, track sneaker prices in real time, or integrate with SNKRS/Adidas/GOAT/StockX data sources.", "kind": "skill", "category": "Domain & Compliance", "goal": "Build"}, {"name": "social-graph-ranker", "desc": "Weighted social-graph ranking for warm intro discovery, bridge scoring, and network gap analysis across X and LinkedIn. Use when the user wants the reusable graph-ranking engine itself, not the broader outreach or network-maintenance workflow layered on top of it.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Research"}, {"name": "social-publisher", "desc": "Agent-driven scheduling and publishing of social media posts across 13 platforms via SocialClaw. Use when the user wants to publish to X, LinkedIn, Instagram, Facebook Pages, TikTok, Discord, Telegram, YouTube, Reddit, WordPress, or Pinterest \u2014 or when managing campaigns, uploading media, or monitoring post delivery status.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "software-implementation", "desc": "Principal Software Engineer, Systems Architect, and Clean Code Advocate. Implements production-ready, SOLID-compliant systems with zero-dependency core logic, strict type safety, 100% test coverage targets, and Domain-Driven Design. Covers domain modeling, use case services, infrastructure adapters, testing suites, concurrency audits, and runtime exception debugging. Use when the user wants to implement a software feature from scratch, refactor code for SOLID compliance, debug a race condition or stack trace, audit code for smells and complexity, or build a full layered architecture (domain \u2192 application \u2192 infrastructure \u2192 tests).", "kind": "skill", "category": "Software Engineering & Tooling", "goal": "Fix & Debug"}, {"name": "sports-scraper", "desc": "Principal Data Engineer and Sports Analytics Specialist with expertise in official sports APIs (NBA API v3, NFL, MLB Stats API, ESPN hidden endpoints), Python libraries (nba_api, pybaseball, sportsreference), and web scraping (Basketball-Reference, Pro-Football-Reference, Understat, FBref). Builds robust, legally compliant data pipelines with PostgreSQL storage, dbt models, Streamlit/Dash dashboards. Use when the user wants to scrape sports stats, download team logos or player images, build a sports analytics dataset, automate a multi-season data pipeline for any league (NBA, NFL, MLB, Premier League, soccer), perform advanced statistical analysis, or visualize sports data.", "kind": "skill", "category": "Data & Scraping", "goal": "Research"}, {"name": "spotify-scraper", "desc": "Expert senior software engineer and API architect specializing in Spotify Web API integration, library management, audio metadata tagging, and local music organization. Builds OAuth 2.0 PKCE flows, paginated library scrapers, audio features analysis, playlist management, SQLite sync databases, Mutagen ID3 metadata injection, and LUFS-normalized audio pipelines. Use when the user wants to sync their Spotify library to a local database, analyze playlist audio features, manage playlists programmatically, build a music metadata tagger, export Spotify data, or create a CLI tool to interact with their Spotify account.", "kind": "skill", "category": "Data & Scraping", "goal": "Build"}, {"name": "springboot-patterns", "desc": "Spring Boot architecture patterns are Engineering & Tooling", "goal": "Fix & Debug"}, {"name": "testing-anti-patterns", "desc": "Catalog of testing anti-patterns to avoid \u2014 don't test mock behavior, don't add test-only methods to production code, understand dependencies before mocking. Use when reviewing tests for anti-patterns or deciding how to mock. For building a test suite or strategy, prefer test-engineer.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "Fix & Debug"}, {"name": "testing-skills-with-subagents", "desc": "RED-GREEN-REFACTOR for process documentation - baseline without skill, write addressing failures, iterate closing loopholes. Use when creating or editing skills, before deployment, to verify they work under pressure and resist rationalization.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "Manage repo & config"}, {"name": "tests-bite", "desc": "Enforces that every new test provably fails when the guard it covers is removed \u2014 the revert\u2192red\u2192restore\u2192green ritual \u2014 so test suites catch real regressions instead of passing vacuously. Use when writing or reviewing ANY test, in any language, especially tests guarding money paths, data integrity, or security checks.", "kind": "skill", "category": "Other", "goal": "Fix & Debug"}, {"name": "theme-factory", "desc": "Apply a visual theme (colors and fonts) to an already-built artifact \u2014 slides, docs, reports, or HTML landing pages \u2014 from 10 presets or a generated theme. Use only when styling or theming an existing artifact. For design tokens and component systems prefer ui-ux-design; for color science prefer color-specialist.", "kind": "skill", "category": "Anthropic official skills 17", "goal": "Design"}, {"name": "tinystruct-patterns", "desc": "Expert guidance for developing with the tinystruct Java framework. Use when working on the tinystruct codebase or any project built on tinystruct \u2014 including creating Application classes, @Action-mapped routes, unit tests, ActionRegistry, HTTP/CLI dual-mode handling, the built-in HTTP server, the event system, JSON with Builder/Builders, database persistence with AbstractData, POJO generation, Server-Sent Events (SSE), file uploads, and outbound HTTP networking.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "token-budget-advisor", "desc": ">- Offers the user an informed choice about response depth before answering. Use when the user explicitly wants to control response length, depth, or token budget. TRIGGER on: \"token budget\", \"token usage\", \"token limit\", \"response length\", \"answer depth\", \"short version\", \"brief answer\", \"detailed answer\", \"exhaustive answer\", \"cu\u00e1ntos tokens\", \"ahorrar tokens\", \"dame la versi\u00f3n corta\", or clear variants asking to control answer size. DO NOT TRIGGER when a level is already set this session, the answer is one word, or \"token\" means auth/payment tokens.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Manage repo & config"}, {"name": "token-saver", "desc": "Ultra-efficient full-stack engineer and scraping architect mode. Delivers hyper-dense, production-ready code with zero explanations, no boilerplate, and no filler \u2014 maximum logic per token. Use when the user wants the fastest possible code output with no commentary, needs complete functional scripts in single dense blocks, is building a Next.js/Playwright scraping platform, or explicitly wants token-optimized code for sneaker aggregators, release calendars, or similar high-throughput web scraping systems.", "kind": "skill", "category": "Software Engineering & Tooling", "goal": "Build"}, {"name": "tracing-knowledge-lineages", "desc": "Understand how ideas evolved over time to find old solutions for new problems and avoid repeating past failures. Use when questioning \"why do we use X\", before abandoning approaches, or evaluating \"new\" ideas that might be revivals.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "More"}, {"name": "ui-demo", "desc": "Record polished UI demo videos using Playwright. Use when the user asks to create a demo, walkthrough, screen recording, or tutorial video of a web application. Produces WebM videos with visible cursor, natural pacing, and professional feel.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "ui-to-vue", "desc": "Use when the user has UI screenshots or design exports that need batch conversion into Vue 3 components, especially with Vant, Element Plus, or Ant Design Vue.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Design"}, {"name": "ui-ux-design", "desc": "Principal UI/UX Architect and Design System Engineer specializing in modular, accessible, and scalable design languages. Creates design tokens, component libraries, and production-ready frontend code with automatic local documentation. Use when the user wants to design a UI component, build a design system, establish brand tokens (colors, typography, spacing), generate accessible React/Tailwind code, or document design changes with a visual changelog.", "kind": "skill", "category": "Design & Creative", "goal": "Design"}, {"name": "uncloud", "desc": "Use when managing an Uncloud cluster \u2014 deploying services, configuring Caddy ingress, adding static proxy routes for non-cluster devices, publishing ports, scaling, inspecting logs, or managing machines and volumes with the `uc` CLI.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Manage repo & config"}, {"name": "unified-notifications-ops", "desc": "Operate notifications as one ECC-native workflow across GitHub, Linear, desktop alerts, hooks, and connected communication surfaces. Use when the real problem is alert routing, deduplication, escalation, or inbox collapse.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Manage repo & config"}, {"name": "using-git-worktrees", "desc": "Create isolated git worktrees with smart directory selection and safety verification. Use when starting feature work that needs isolation from current workspace, before executing implementation plans.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "Manage repo & config"}, {"name": "using-skills", "desc": "Skills wiki intro - mandatory workflows, search tool, brainstorming triggers. Use when starting any conversation.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "Manage repo & config"}, {"name": "using-tmux-for-interactive-commands", "desc": "Use when you need to run interactive CLI tools (vim, git rebase -i, Python REPL, etc.) that require real-time input/output - provides tmux-based approach for controlling interactive sessions through detached sessions and send-keys", "kind": "skill", "category": "Superpowers Lab  experimental 4", "goal": "Manage repo & config"}, {"name": "verification-before-completion", "desc": "Run verification commands and confirm output before claiming success. Use when about to claim work is complete, fixed, or passing, before committing or creating PRs.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "Fix & Debug"}, {"name": "verification-loop", "desc": "A comprehensive verification system for Claude Code sessions. Use when the user wants to run the full pre-PR quality gate on a JavaScript/TypeScript or Python project \u2014 npm/pnpm build, tsc/pyright type check, eslint/ruff lint, test suite with coverage, secret scan, and git diff review \u2014 to confirm a change is ready to merge.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Fix & Debug"}, {"name": "video-editing", "desc": "AI-assisted video editing workflows for cutting, structuring, and augmenting real footage. Covers the full pipeline from raw capture through FFmpeg, Remotion, ElevenLabs, fal.ai, and final polish in Descript or CapCut. Use when the user wants to edit video, cut footage, create vlogs, or build video content.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "video-to-animation", "desc": "Video-to-Animation conversion pipeline expert. Converts a video of a person's movement into rigged character animation \u2014 AI motion capture, skeleton retargeting, foot-sliding cleanup, sprite sheets, and animation-clip import into Godot, Unreal Engine 5, Unity, or Blender. Use when the user wants to turn video into motion-capture data, retarget it onto a game skeleton, or produce a sprite sheet / animation clip from footage. For non-animation game assets (visuals, audio, physics, full scene pipelines) see video-to-game instead.", "kind": "skill", "category": "Game Development", "goal": "Design"}, {"name": "video-to-game", "desc": "AI Video-to-Game conversion pipeline expert. Converts AI-generated or real video into a full set of playable game assets \u2014 background-removed sprites, extracted SFX, physics values (gravity/velocity/bounce), depth-layered parallax backgrounds, color-grading LUTs \u2014 plus a continuous in-engine testing loop that compares screenshots against the source video, for Godot and Unreal Engine 5. Use when the user wants to replicate a video's whole scene or asset set in an engine, extract audio or physics from footage, or build a test loop checking in-engine output against video. For character motion-capture and skeletal animation retargeting, see video-to-animation instead.", "kind": "skill", "category": "Game Development", "goal": "Build"}, {"name": "videodb", "desc": "See, understand, and act on video and audio. Ingest local files, URLs, RTSP/live feeds, or desktop recordings; extract frames, build visual/semantic/temporal indexes, and search moments with timestamps and auto-clips; transcode, edit timelines (subtitles, overlays, dubbing, translation), generate media assets, and create real-time alerts from live streams. Use when the user wants to ingest, index, search, edit, or set real-time alerts on video, audio, live streams, or desktop captures with timestamped, playable evidence.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "visa-doc-translate", "desc": "Translate visa application documents (images) to English and create a bilingual PDF with original and translation. Use when the user provides a photo or scan (HEIC/PNG/JPG) of an official document \u2014 bank deposit, employment, retirement, or property certificate, business license, ID, or passport \u2014 and wants it OCR'd, professionally translated to English, and output as a two-page bilingual PDF for a visa application.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "visual-prototype", "desc": ">- Build a high-fidelity, interactive, single-file UI/UX prototype with a built-in \"Tweak & Comment\" review overlay (click-to-pin feedback, markdown export, theme/motion/viewport tweaks). Use whenever the user wants to prototype, mock up, design, wireframe, or visualize an app, screen, dashboard, game UI, landing page, component, or user flow they can click through \u2014 even without the word \"prototype.\" Trigger for \"show me what X could look like,\" \"make a clickable mockup,\" \"design a UI for,\" \"build a demo of this screen,\" or when iterating from pasted review feedback. The default skill for reviewable front-end mockups.", "kind": "skill", "category": "Web & Frontend", "goal": "Design"}, {"name": "vite-patterns", "desc": "Vite build tool patterns including config, plugins, HMR, env variables, proxy setup, SSR, library mode, dependency pre-bundling, and build optimization. Activate when working with vite.config.ts, Vite plugins, or Vite-based projects. Use when the user wants to configure vite.config.ts, set up a dev server proxy or VITE_ env variables, publish a library with build.lib, tune manualChunks or dependency pre-bundling, or debug HMR/CJS-ESM interop and dev-vs-build mismatches in a Vite project.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "vue-patterns", "desc": "Vue.js 3 Composition API patterns, component architecture, reactivity best practices, Pinia state management, Vue Router navigation, and Nuxt SSR patterns. Activates for Vue, Nuxt, Vite, or Pinia projects.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "wargame", "desc": "Stress-tests a plan on paper before it's trusted \u2014 read-only recon, then a battle plan where every move has an expected observation, every failure has a named counter-move, every fork has an explicit trigger, and every unresolved assumption is flagged RECON NEEDED. Ends with abort conditions, a verification checklist, and a red-team pass. Use before scaffolding a brand-new app/feature/skill/harness (the prototype-gate moment), before handing a plan-gate or writing-plans plan to a subagent or cheaper model to execute, or any time a plan can't afford to be wrong on the first try.", "kind": "skill", "category": "Other", "goal": "Build"}, {"name": "web-artifacts-builder", "desc": "Building complex multi-component claude.ai HTML artifacts (React, Tailwind, shadcn/ui) with state and routing. Use only when the deliverable is a claude.ai artifact needing shadcn/ui or multiple components \u2014 not for production web apps (prefer web-implementation) or simple single-file artifacts. Use when the user wants to build a multi-component claude.ai artifact with React + TypeScript + Tailwind + shadcn/ui and bundle it into a single self-contained HTML file to share in the conversation.", "kind": "skill", "category": "Anthropic official skills 17", "goal": "Build"}, {"name": "web-deployment", "desc": "Expert DevOps engineer and cloud infrastructure architect specializing in low-overhead, high-efficiency deployments for Next.js applications and automated scraping workers. Delivers Docker configs, Vercel deployments, GitHub Actions CI/CD pipelines, PostgreSQL connection pooling, Kubernetes basics, Redis deployment, monitoring/alerting, and rollback strategies. Use when the user wants to deploy a Next.js app, containerize a scraping worker with Docker, set up GitHub Actions CI/CD, configure environment variables for production, optimize a PostgreSQL connection pool, or design a rollback strategy.", "kind": "skill", "category": "Web & Frontend", "goal": "Manage repo & config"}, {"name": "web-implementation", "desc": "Principal Frontend Architect and Core Web Vitals Engineer. Builds highly optimized, accessible web interfaces with sub-1s LCP, WCAG 2.2 AA compliance, SSR/ISR optimization, and zero hydration mismatches. Use when the user wants to build a web component, implement a UI feature, optimize Core Web Vitals, debug SSR/hydration errors, or architect a frontend system in Next.js, React, Vue, or Svelte.", "kind": "skill", "category": "Web & Frontend", "goal": "Build"}, {"name": "web-page-builder", "desc": "THE primary, always-on skill for building any website \u2014 landing page, marketing site, portfolio, product page, web app UI, or microsite. Use whenever the user wants to build, create, design, redesign, or ship a website or web page. Runs one loop \u2014 pull a look from the taste library, commit a bold direction, build wide, view-and-tweak live in the browser, polish with impeccable, add award-tier motion, and deploy \u2014 folding in frontend-design, premium-web-craft, impeccable, visual-prototype, web-implementation, web-deployment, and Higgsfield assets. The front door for all website work; prefer it over the individual design skills.", "kind": "skill", "category": "Web & Frontend", "goal": "Design"}, {"name": "web-scraper", "desc": "Expert-level web scraping and data structuring agent. Extracts, cleans, organizes, and formats data from user-provided website URLs into structured output (tables, lists, graphs). Covers HTTP scraping, JavaScript-rendered content with Playwright, crawl architecture, anti-bot handling for authorized scraping, proxy management, storage pipelines, and legal/ethical compliance. Use when the user wants to scrape a website, extract data from a URL, parse webpage content, or structure online data into a specific format.", "kind": "skill", "category": "Web & Frontend", "goal": "Research"}, {"name": "webapp-testing", "desc": "Drive and test a running local web app with Playwright \u2014 verify frontend behavior, capture browser screenshots, read browser logs. Use when interacting with a live browser or web app for end-to-end or UI debugging. For unit/integration strategy and TDD, prefer test-engineer.", "kind": "skill", "category": "Anthropic official skills 17", "goal": "Fix & Debug"}, {"name": "when-stuck", "desc": "Dispatch to the right problem-solving technique based on how you're stuck. Use when stuck and unsure which problem-solving technique to apply for your specific type of stuck-ness.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "More"}, {"name": "windows-desktop-e2e", "desc": "E2E testing for Windows native desktop apps (WPF, WinForms, Win32/MFC, Qt) using pywinauto and Windows UI Automation. Use when the user wants to write, run, or debug E2E tests for Windows native desktop apps (WPF, WinForms, Win32/MFC, Qt) using pywinauto and UI Automation, or add testability and CI for them.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Fix & Debug"}, {"name": "windows-env-repair", "desc": "> Repair a broken Windows dev environment \u2014 OneDrive-redirected user folders, lost/relocated project paths, broken git links, and out-of-sync global config. Use when files moved into OneDrive, a project's git remote or working dir broke, or the machine drifted from its source-of-truth config repo.", "kind": "skill", "category": "Software Engineering & Tooling", "goal": "Manage repo & config"}, {"name": "windows-vm", "desc": "Create, manage, or connect to a headless Windows 11 VM running in Docker with SSH access. Use when the user wants to spin up, stop, restart, or SSH into a Windows VM.", "kind": "skill", "category": "Superpowers Lab  experimental 4", "goal": "Design"}, {"name": "workspace-surface-audit", "desc": "Audit the active repo, MCP servers, plugins, connectors, env surfaces, and harness setup, then recommend the highest-value ECC-native skills, hooks, agents, and operator workflows. Use when the user wants help setting up Claude Code or understanding what capabilities are actually available in their environment.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Automate & Loop"}, {"name": "writing-plans", "desc": "Create detailed implementation plans with bite-sized tasks for engineers with zero codebase context. Use when design is complete and you need detailed implementation tasks for engineers with zero codebase context.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "Build"}, {"name": "writing-skills", "desc": "Methodology for writing high-quality skill and process instructions \u2014 verify with subagents (TDD-style) and iterate until the instructions are bulletproof. Use when the user wants principles for, or a review of, how a skill's instructions are written. For generating the SKILL.md itself, prefer skill-builder.", "kind": "skill", "category": "Superpowers  engineering workflow & thinking 28", "goal": "Manage repo & config"}, {"name": "x-api", "desc": "X/Twitter API integration for posting tweets, threads, reading timelines, search, and analytics. Covers OAuth auth patterns, rate limits, and platform-native content posting. Use when the user wants to interact with X programmatically.", "kind": "skill", "category": "ECC engineering toolkit 270", "goal": "Build"}, {"name": "xlsx", "desc": "Use this skill any time a spreadsheet file is the primary input or output. This means any task where the user wants to: open, read, edit, or fix an existing .xlsx, .xlsm, .csv, or .tsv file (e.g., adding columns, computing formulas, formatting, charting, cleaning messy data); create a new spreadsheet from scratch or from other data sources; or convert between tabular file formats. Trigger especially when the user references a spreadsheet file by name or path \u2014 even casually (like \"the xlsx in my downloads\") \u2014 and wants something done to it or produced from it. Also trigger for cleaning or restructuring messy tabular data files (malformed rows, misplaced headers, junk data) into proper spreadsheets. The deliverable must be a spreadsheet file. Do NOT trigger when the primary deliverable is a Word document, HTML report, standalone Python script, database pipeline, or Google Sheets API integration, even if tabular data is involved.", "kind": "skill", "category": "Anthropic official skills 17", "goal": "Research"}, {"name": "youtube-research", "desc": "Elite YouTube Growth Strategist and Audience Retention Expert. Analyzes high-CTR thumbnails, title frameworks, viral hook strategies, viewer retention trends, YouTube algorithm mechanics, YouTube API v3 data extraction, monetization strategy, and content calendar planning. Use when the user wants to research a YouTube video topic, optimize titles and thumbnails, deconstruct competitor videos, debug low retention or CTR, build a content strategy for any channel niche, or analyze YouTube algorithm signals.", "kind": "skill", "category": "Marketing & Growth", "goal": "Research"}, {"name": "a11y-architect", "desc": "Accessibility Architect specializing in WCAG 2.2 compliance for Web and Native platforms. Use PROACTIVELY when designing UI components, establishing design systems, or auditing code for inclusive user experiences.", "kind": "agent", "category": "Agent", "goal": "Design"}, {"name": "agent-evaluator", "desc": "Evaluates agent output against 5-axis quality rubric (accuracy, completeness, clarity, actionability, conciseness). Use after any non-trivial task when the user wants a quality assessment, or when the agent-self-evaluation skill is active. Produces structured scorecard with evidence and improvement suggestions.", "kind": "agent", "category": "Agent", "goal": "Automate & Loop"}, {"name": "architect", "desc": "Software architecture specialist for system design, scalability, and technical decision-making. Use PROACTIVELY when planning new features, refactoring large systems, or making architectural decisions.", "kind": "agent", "category": "Agent", "goal": "Build"}, {"name": "build-error-resolver", "desc": "Build and TypeScript error resolution specialist. Use PROACTIVELY when build fails or type errors occur. Fixes build/type errors only with minimal diffs, no architectural edits. Focuses on getting the build green quickly.", "kind": "agent", "category": "Agent", "goal": "Build"}, {"name": "chief-of-staff", "desc": "Personal communication chief of staff that triages email, Slack, LINE, and Messenger. Classifies messages into 4 tiers (skip/info_only/meeting_info/action_required), generates draft replies, and enforces post-send follow-through via hooks. Use when managing multi-channel communication workflows.", "kind": "agent", "category": "Agent", "goal": "Write"}, {"name": "code-architect", "desc": "Designs feature architectures by analyzing existing codebase patterns and conventions, then providing implementation blueprints with concrete files, interfaces, data flow, and build order.", "kind": "agent", "category": "Agent", "goal": "Build"}, {"name": "code-explorer", "desc": "Deeply analyzes existing codebase features by tracing execution paths, mapping architecture layers, and documenting dependencies to inform new development.", "kind": "agent", "category": "Agent", "goal": "Build"}, {"name": "code-reviewer", "desc": "Expert code review specialist. Proactively reviews code for quality, security, and maintainability. Use immediately after writing or modifying code. MUST BE USED for all code changes.", "kind": "agent", "category": "Agent", "goal": "Fix & Debug"}, {"name": "code-simplifier", "desc": "Simplifies and refines code for clarity, consistency, and maintainability while preserving behavior. Focus on recently modified code unless instructed otherwise.", "kind": "agent", "category": "Agent", "goal": "More"}, {"name": "comment-analyzer", "desc": "Analyze code comments for accuracy, completeness, maintainability, and comment rot risk.", "kind": "agent", "category": "Agent", "goal": "Research"}, {"name": "conversation-analyzer", "desc": "Use this agent when analyzing conversation transcripts to find behaviors worth preventing with hooks. Triggered by /hookify without arguments.", "kind": "agent", "category": "Agent", "goal": "Research"}, {"name": "cpp-build-resolver", "desc": "C++ build, CMake, and compilation error resolution specialist. Fixes build errors, linker issues, and template errors with minimal changes. Use when C++ builds fail.", "kind": "agent", "category": "Agent", "goal": "Build"}, {"name": "cpp-reviewer", "desc": "Expert C++ code reviewer specializing in memory safety, modern C++ idioms, concurrency, and performance. Use for all C++ code changes. MUST BE USED for C++ projects.", "kind": "agent", "category": "Agent", "goal": "Fix & Debug"}, {"name": "csharp-reviewer", "desc": "Expert C# code reviewer specializing in .NET conventions, async patterns, security, nullable reference types, and performance. Use for all C# code changes. MUST BE USED for C# projects.", "kind": "agent", "category": "Agent", "goal": "Fix & Debug"}, {"name": "dart-build-resolver", "desc": "Dart/Flutter build, analysis, and dependency error resolution specialist. Fixes `dart analyze` errors, Flutter compilation failures, pub dependency conflicts, and build_runner issues with minimal, surgical changes. Use when Dart/Flutter builds fail.", "kind": "agent", "category": "Agent", "goal": "Build"}, {"name": "database-reviewer", "desc": "PostgreSQL database specialist for query optimization, schema design, security, and performance. Use PROACTIVELY when writing SQL, creating migrations, designing schemas, or troubleshooting database performance. Incorporates Supabase best practices.", "kind": "agent", "category": "Agent", "goal": "Build"}, {"name": "deliverable-verifier", "desc": "Independent finish-line verifier. Opens the ACTUAL deliverable the user will receive \u2014 the export, the built artifact, the live page, the render \u2014 and proves it works before any \"done\" claim. Use PROACTIVELY as the final gate of every harness and before handing over any non-trivial deliverable. Rejects proxy evidence (a happy-path run, a flattering angle, a curated render) in favor of the real artifact.", "kind": "agent", "category": "Agent", "goal": "Design"}, {"name": "django-build-resolver", "desc": "Django/Python build, migration, and dependency error resolution specialist. Fixes pip/Poetry errors, migration conflicts, import errors, Django configuration issues, and collectstatic failures with minimal changes. Use when Django setup or startup fails.", "kind": "agent", "category": "Agent", "goal": "Fix & Debug"}, {"name": "django-reviewer", "desc": "Expert Django code reviewer specializing in ORM correctness, DRF patterns, migration safety, security misconfigurations, and production-grade Django practices. Use for all Django code changes. MUST BE USED for Django projects.", "kind": "agent", "category": "Agent", "goal": "Fix & Debug"}, {"name": "doc-updater", "desc": "Documentation and codemap specialist. Use PROACTIVELY for updating codemaps and documentation. Runs /update-codemaps and /update-docs, generates docs/CODEMAPS/*, updates READMEs and guides.", "kind": "agent", "category": "Agent", "goal": "Write"}, {"name": "docs-lookup", "desc": "When the user asks how to use a library, framework, or API or needs up-to-date code examples, use Context7 MCP to fetch current documentation and return answers with examples. Invoke for docs/API/setup questions.", "kind": "agent", "category": "Agent", "goal": "Write"}, {"name": "e2e-runner", "desc": "End-to-end testing specialist using Vercel Agent Browser (preferred) with Playwright fallback. Use PROACTIVELY for generating, maintaining, and running E2E tests. Manages test journeys, quarantines flaky tests, uploads artifacts (screenshots, videos, traces), and ensures critical user flows work.", "kind": "agent", "category": "Agent", "goal": "Fix & Debug"}, {"name": "env-scout", "desc": "Environment scout. PROVES what the current box can and cannot do \u2014 installed interpreters/modules, reachable hosts, disk, surface capabilities \u2014 by running the probes, never by recalling. Use PROACTIVELY before claiming a dependency is missing, a host is blocked, or a surface \"can't\" do something, and whenever a session starts acting on beliefs about the environment that haven't been verified this session. Writes durable new facts into PROGRESS.md so no surface re-litigates them.", "kind": "agent", "category": "Agent", "goal": "Design"}, {"name": "fastapi-reviewer", "desc": "Reviews FastAPI applications for async correctness, dependency injection, Pydantic schemas, security, OpenAPI quality, testing, and production readiness.", "kind": "agent", "category": "Agent", "goal": "Fix & Debug"}, {"name": "file-butler", "desc": "Laptop file organizer. Keeps Kariim's messy zones (Downloads, Desktop, and any dir he names) sorted automatically \u2014 moves only, never deletes, full undo manifest per run, never touches git repos or in-flight files. Use PROACTIVELY when the user asks to organize, tidy, clean up, or sort files/folders, and as the worker for the scheduled file-butler loop on the laptop. First run in any zone is report-and-confirm; steady state is automatic.", "kind": "agent", "category": "Agent", "goal": "Automate & Loop"}, {"name": "flutter-reviewer", " s.", "kind": "agent", "category": "Agent", "goal": "Build"}, {"name": "react-reviewer", "desc": "Expert React/JSX code reviewer specializing in hook correctness, render performance, server/client component boundaries, accessibility, and React-specific security. Use for any change touching .tsx/.jsx files or React component logic. MUST BE USED for React projects.", "kind": "agent", "category": "Agent", "goal": "Build"}, {"name": "refactor-cleaner", "desc": "Dead code cleanup and consolidation specialist. Use PROACTIVELY for removing unused code, duplicates, and refactoring. Runs analysis tools (knip, depcheck, ts-prune) to identify dead code and safely removes it.", "kind": "agent", "category": "Agent", "goal": "Fix & Debug"}, {"name": "rust-build-resolver", "desc": "Rust build, compilation, and dependency error resolution specialist. Fixes cargo build errors, borrow checker issues, and Cargo.toml problems with minimal changes. Use when Rust builds fail.", "kind": "agent", "category": "Agent", "goal": "Build"}, {"name": "rust-reviewer", "desc": "Expert Rust code reviewer specializing in ownership, lifetimes, error handling, unsafe usage, and idiomatic patterns. Use for all Rust code changes. MUST BE USED for Rust projects.", "kind": "agent", "category": "Agent", "goal": "Fix & Debug"}, {"name": "scribe", "desc": "Continuity keeper. Reconciles every handoff surface from ACTUAL state \u2014 PROGRESS.md, HANDOFF.md, README counts, ledger sync, relay entries \u2014 at session end or on schedule. Use PROACTIVELY when wrapping up a session where state changed, and whenever handoff docs may have drifted from reality. Never invents state; every line it writes is backed by a command it ran.", "kind": "agent", "category": "Agent", "goal": "Manage repo & config"}, {"name": "security-reviewer", "desc": "Security vulnerability detection and remediation specialist. Use PROACTIVELY after writing code that handles user input, authentication, API endpoints, or sensitive data. Flags s
